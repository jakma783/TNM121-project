<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>FilmScope</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=search" />
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=menu" />
        <script src="scripts.js" defer></script>
        <script src="movie.js" defer></script>
    </head>
    <body class="movie-page">
        <div class="hero" id="heroBanner">
            <div class="task-bar">

                <div class="left">
                    <a href="index.html">
                        <img id="logo-image" src="media/logo.png" alt="logo">
                    </a>
                </div>

                <div class="center">
                    <div class="search-wrapper">
                        <span class="search-icon"><span class="material-symbols-outlined"></span></span>
                        <input type="text" id="searchInput" placeholder="Search for a movie...">
                        <div id="resultsDropdown"></div>
                    </div>
                </div>

                <div class="right">
                    <div class="menu-wrapper">
                        <button class="menu-btn" type="button">
                            <span class="material-symbols-outlined">menu</span>
                        </button>

                        <div id="menuDropdown" class="dropdown"></div>
                    </div>
                </div>

            </div>
    </div>
        <div class="movie-container">
            <div class="poster-section">
                <img id="poster" alt="movie image">
            </div>
        
            <div class="info-section">
                <h1 id="title">No title</h1>
        
                <div class="meta-row">
                    <span id="year"></span>
                    <span id="genre"></span>
                    <span id="length"></span>
                </div>
        
                <div class="ratings">
                    <p><strong>IMDb:</strong> <span id="rating"></span></p>
                    <p><strong>Bechdel:</strong> <span id="bechdel"></span></p>
                </div>
        
                <p id="description"></p>
        
                <h3>Director</h3>
                <ul id="director-list"></ul>
        
                <h3>Actors</h3>
                <ul id="actors-list"></ul>
        
            </div>
        </div>
    </body>
</html>
